[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; XH-S3E N16R8: 16MB flash, 8MB PSRAM
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi   ; OPI PSRAM on R8 variant

; USB — use the UART bridge port (left USB on most DevKitC-1 boards)
monitor_speed = 115200
monitor_port = /dev/ttyUSB0   ; adjust if needed

; OTA
upload_protocol = espota
upload_port = gps-n2k.local   ; mDNS hostname set in Config.h
upload_flags =
    --port=3232
    --auth=

lib_deps =
    ttlappalainen/NMEA2000@^4.19.0
    https://github.com/ttlappalainen/NMEA2000_esp32_twai.git
    sparkfun/SparkFun u-blox GNSS v3@^3.1.5

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0