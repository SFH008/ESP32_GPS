[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200

; ── Upload ───────────────────────────────────────────────────────────────────
; First flash: comment out espota lines, use serial port below
; Subsequent updates: uncomment espota lines, comment out upload_port serial
#upload_protocol = espota
#upload_port = gps-n2k.local

lib_deps =
    ttlappalainen/NMEA2000-library@^4.19.0
    https://github.com/sergei/NMEA2000_esp32_twai.git
    sparkfun/SparkFun u-blox GNSS v3@^3.1.5
    tzapu/WiFiManager@^2.0.17
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
